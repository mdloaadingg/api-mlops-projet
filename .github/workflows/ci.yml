name: CI Pipeline MLOps

# Q16 : Événements déclencheurs (push et pull request sur la branche main)
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest # On utilise un serveur Linux tout neuf

    steps:
    - name: 📥 Récupération du code
      uses: actions/checkout@v4

    - name: 🐍 Installation de Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # Q17 : Installation et tests
    - name: 📦 Installation des dépendances
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 🧠 Entraînement du modèle (Création de model.joblib)
      run: |
        python generate_dataset.py
        python src/mlops_tp/train.py

    - name: 🧪 Exécution des tests automatisés (Pytest)
      run: |
        python -m pytest

    # Q18 : Étape de build Docker
    - name: 🐳 Test de construction de l'image Docker
      run: |
        docker build -t test-api-mlops .